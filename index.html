<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Yachay</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div id="yachay">

    <div class="face">

        <div class="eye left-eye"></div>
        <div class="eye right-eye"></div>

    </div>

</div>

<div id="speech">

    <div class="speech-content">

        <strong>👋 ¡Hola!</strong><br><br>

        Soy <strong>Yachay</strong>, tu guía especializado en los saberes ancestrales de Tungurahua.

        <br><br>

        ¿Cómo puedo ayudarte hoy?

    </div>

</div>

<div id="chat-window">

    <div id="chat-header">

        <div>

            <strong>Yachay</strong><br>

            <span>Guía Virtual</span>

        </div>

    </div>

    <div id="messages">

        <div class="bot-message">

            ¡Hola! 👋

            <br><br>

            Soy Yachay.

            Estoy listo para responder preguntas sobre los saberes ancestrales de Tungurahua.

        </div>

    </div>

    <div id="chat-input">

        <input
            id="user-input"
            type="text"
            placeholder="Escribe aquí..."
        >

        <button id="send">

            ➜

        </button>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
